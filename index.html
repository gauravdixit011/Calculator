<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: linear-gradient(135deg, #0f172a 0%, #1e293b 45%, #312e81 100%);
            --panel-bg: rgba(15, 23, 42, 0.72);
            --glass-border: rgba(148, 163, 184, 0.25);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --shadow-strong: 0 28px 60px rgba(2, 6, 23, 0.55);
            --shadow-soft: 0 8px 16px rgba(2, 6, 23, 0.28);
            --btn-bg: rgba(148, 163, 184, 0.16);
            --btn-bg-hover: rgba(148, 163, 184, 0.26);
            --operator: #f59e0b;
            --success: #22c55e;
            --danger: #ef4444;
            --info: #38bdf8;
            --accent: #a855f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-main);
            padding: 32px 20px;
            color: var(--text-main);
        }

        .calculator {
            width: min(100%, 390px);
            background: var(--panel-bg);
            backdrop-filter: blur(14px);
            border-radius: 28px;
            box-shadow: var(--shadow-strong);
            overflow: hidden;
            border: 1px solid var(--glass-border);
            position: relative;
        }

        .display {
            padding: 26px 24px 22px;
            background: linear-gradient(160deg, rgba(15, 23, 42, 0.82), rgba(15, 23, 42, 0.35));
            text-align: right;
            min-height: 138px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border-bottom: 1px solid rgba(148, 163, 184, 0.15);
        }

        .previous-operand {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 6px;
            min-height: 20px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .current-operand {
            color: var(--text-main);
            font-size: clamp(2.2rem, 5vw, 2.9rem);
            font-weight: 700;
            letter-spacing: 0.4px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 18px;
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.45) 0%, rgba(15, 23, 42, 0.12) 100%);
        }

        button {
            border: 1px solid rgba(148, 163, 184, 0.2);
            outline: none;
            padding: 15px 10px;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.14s ease, background-color 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
            background: var(--btn-bg);
            color: var(--text-main);
            box-shadow: var(--shadow-soft);
        }

        button:hover {
            background: var(--btn-bg-hover);
            transform: translateY(-2px);
            border-color: rgba(148, 163, 184, 0.4);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 5px 10px rgba(2, 6, 23, 0.25);
        }

        button:focus-visible {
            box-shadow: 0 0 0 2px rgba(248, 250, 252, 0.9), 0 0 0 5px rgba(96, 165, 250, 0.45);
        }

        .operator {
            background: rgba(245, 158, 11, 0.2);
            color: #fcd34d;
            border-color: rgba(245, 158, 11, 0.4);
        }

        .equals {
            background: rgba(34, 197, 94, 0.24);
            color: #bbf7d0;
            border-color: rgba(34, 197, 94, 0.45);
            grid-column: span 2;
        }

        .clear, .delete {
            background: rgba(239, 68, 68, 0.22);
            color: #fecaca;
            border-color: rgba(239, 68, 68, 0.4);
        }

        .function {
            background: rgba(168, 85, 247, 0.2);
            color: #e9d5ff;
            border-color: rgba(168, 85, 247, 0.38);
        }

        .memory {
            background: rgba(56, 189, 248, 0.2);
            color: #bae6fd;
            border-color: rgba(56, 189, 248, 0.36);
        }

        .history-panel {
            position: absolute;
            top: 26px;
            right: 26px;
            width: min(90vw, 320px);
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            padding: 16px;
            color: var(--text-main);
            max-height: 78vh;
            overflow-y: auto;
            display: none;
            box-shadow: var(--shadow-strong);
            border: 1px solid var(--glass-border);
            z-index: 20;
        }

        .history-panel h3 {
            margin-bottom: 14px;
            text-align: center;
            color: #fde68a;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .history-item {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .show-history,
        .theme-selector {
            position: absolute;
            background: rgba(15, 23, 42, 0.74);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            z-index: 12;
        }

        .show-history:hover,
        .theme-selector:hover {
            transform: translateY(-2px);
            background: rgba(30, 41, 59, 0.92);
        }

        .show-history {
            top: 24px;
            left: 24px;
        }

        .theme-selector {
            bottom: 24px;
            left: 24px;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                gap: 14px;
            }

            .calculator {
                border-radius: 24px;
            }

            .history-panel {
                position: relative;
                top: auto;
                right: auto;
                width: min(100%, 390px);
                max-height: 220px;
                margin-top: 10px;
                display: block;
            }

            .show-history,
            .theme-selector {
                position: relative;
                top: auto;
                left: auto;
                bottom: auto;
                width: 46px;
                height: 46px;
                border-radius: 12px;
            }
        }
</style>
</head>
<body>
    <button class="show-history" onclick="toggleHistory()">
        <i class="fas fa-history"></i>
    </button>
    
    <div class="calculator">
        <div class="display">
            <div class="previous-operand"></div>
            <div class="current-operand">0</div>
        </div>
        <div class="buttons">
            <button class="memory" data-action="mc">MC</button>
            <button class="memory" data-action="mr">MR</button>
            <button class="memory" data-action="m-plus">M+</button>
            <button class="memory" data-action="m-minus">M-</button>
            
            <button class="clear" data-action="clear">C</button>
            <button class="delete" data-action="delete">DEL</button>
            <button class="function" data-action="percent">%</button>
            <button class="operator" data-action="divide">/</button>
            
            <button class="function" data-action="square">x²</button>
            <button class="function" data-action="square-root">√</button>
            <button class="function" data-action="power">x^y</button>
            <button class="operator" data-action="multiply">×</button>
            
            <button data-number="7">7</button>
            <button data-number="8">8</button>
            <button data-number="9">9</button>
            <button class="operator" data-action="subtract">-</button>
            
            <button data-number="4">4</button>
            <button data-number="5">5</button>
            <button data-number="6">6</button>
            <button class="operator" data-action="add">+</button>
            
            <button data-number="1">1</button>
            <button data-number="2">2</button>
            <button data-number="3">3</button>
            <button class="function" data-action="reciprocal">1/x</button>
            
            <button data-action="negate">±</button>
            <button data-number="0">0</button>
            <button data-action="decimal">.</button>
            <button class="equals" data-action="equals">=</button>
        </div>
    </div>
    
    <div class="history-panel">
        <h3>Calculation History</h3>
        <div class="history-list"></div>
    </div>
    
    <button class="theme-selector" onclick="changeTheme()">
        <i class="fas fa-palette"></i>
    </button>

    <script>
        // Calculator state
        let currentOperand = '0';
        let previousOperand = '';
        let operation = undefined;
        let memory = 0;
        let calculationHistory = [];
        const themes = [
            { name: 'Default', bg: 'linear-gradient(45deg, #1a1a2e, #16213e)', display: 'rgba(0, 0, 0, 0.3)' },
            { name: 'Sunset', bg: 'linear-gradient(45deg, #ff6b6b, #ff9e6b)', display: 'rgba(0, 0, 0, 0.2)' },
            { name: 'Ocean', bg: 'linear-gradient(45deg, #0a3d62, #1e5799)', display: 'rgba(255, 255, 255, 0.1)' },
            { name: 'Forest', bg: 'linear-gradient(45deg, #2d5a27, #4e9f3d)', display: 'rgba(0, 0, 0, 0.25)' }
        ];
        let currentTheme = 0;

        // DOM Elements
        const currentOperandElement = document.querySelector('.current-operand');
        const previousOperandElement = document.querySelector('.previous-operand');
        const historyListElement = document.querySelector('.history-list');
        const historyPanelElement = document.querySelector('.history-panel');

        // Update display
        function updateDisplay() {
            currentOperandElement.innerText = currentOperand;
            if (operation != null) {
                previousOperandElement.innerText = `${previousOperand} ${getOperationSymbol(operation)}`;
            } else {
                previousOperandElement.innerText = previousOperand;
            }
        }

        // Get operation symbol for display
        function getOperationSymbol(op) {
            switch (op) {
                case 'add': return '+';
                case 'subtract': return '-';
                case 'multiply': return '×';
                case 'divide': return '÷';
                case 'power': return '^';
                default: return '';
            }
        }

        // Add digit to current operand
        function appendNumber(number) {
            if (number === '.' && currentOperand.includes('.')) return;
            if (currentOperand === '0' && number !== '.') {
                currentOperand = number;
            } else {
                currentOperand = currentOperand.toString() + number.toString();
            }
        }

        // Choose operation
        function chooseOperation(op) {
            if (currentOperand === '') return;
            if (previousOperand !== '') {
                calculate();
            }
            operation = op;
            previousOperand = currentOperand;
            currentOperand = '';
        }

        // Perform calculation
        function calculate() {
            let computation;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);
            if (isNaN(prev) || isNaN(current)) return;
            
            switch (operation) {
                case 'add':
                    computation = prev + current;
                    break;
                case 'subtract':
                    computation = prev - current;
                    break;
                case 'multiply':
                    computation = prev * current;
                    break;
                case 'divide':
                    computation = prev / current;
                    break;
                case 'power':
                    computation = Math.pow(prev, current);
                    break;
                default:
                    return;
            }
            
            // Add to history
            addToHistory(`${previousOperand} ${getOperationSymbol(operation)} ${currentOperand} = ${computation}`);
            
            currentOperand = computation;
            operation = undefined;
            previousOperand = '';
        }

        // Add calculation to history
        function addToHistory(calculation) {
            calculationHistory.unshift(calculation);
            if (calculationHistory.length > 10) {
                calculationHistory.pop();
            }
            updateHistoryDisplay();
        }

        // Update history display
        function updateHistoryDisplay() {
            historyListElement.innerHTML = '';
            calculationHistory.forEach(item => {
                const historyItem = document.createElement('div');
                historyItem.classList.add('history-item');
                historyItem.textContent = item;
                historyListElement.appendChild(historyItem);
            });
        }

        // Clear calculator
        function clear() {
            currentOperand = '0';
            previousOperand = '';
            operation = undefined;
        }

        // Delete last digit
        function deleteDigit() {
            currentOperand = currentOperand.toString().slice(0, -1);
            if (currentOperand === '') {
                currentOperand = '0';
            }
        }

        // Special functions
        function executeSpecialFunction(func) {
            const current = parseFloat(currentOperand);
            if (isNaN(current)) return;
            
            let computation;
            switch (func) {
                case 'square':
                    computation = Math.pow(current, 2);
                    addToHistory(`sqr(${current}) = ${computation}`);
                    break;
                case 'square-root':
                    computation = Math.sqrt(current);
                    addToHistory(`√(${current}) = ${computation}`);
                    break;
                case 'reciprocal':
                    computation = 1 / current;
                    addToHistory(`1/(${current}) = ${computation}`);
                    break;
                case 'percent':
                    computation = current / 100;
                    addToHistory(`${current}% = ${computation}`);
                    break;
                case 'negate':
                    computation = -current;
                    break;
                default:
                    return;
            }
            
            currentOperand = computation;
        }

        // Memory functions
        function executeMemoryFunction(func) {
            switch (func) {
                case 'mc':
                    memory = 0;
                    break;
                case 'mr':
                    currentOperand = memory;
                    break;
                case 'm-plus':
                    memory += parseFloat(currentOperand);
                    break;
                case 'm-minus':
                    memory -= parseFloat(currentOperand);
                    break;
                default:
                    return;
            }
        }

        // Toggle history panel
        function toggleHistory() {
            if (historyPanelElement.style.display === 'block') {
                historyPanelElement.style.display = 'none';
            } else {
                historyPanelElement.style.display = 'block';
            }
        }

        // Change theme
        function changeTheme() {
            currentTheme = (currentTheme + 1) % themes.length;
            document.body.style.background = themes[currentTheme].bg;
            document.querySelector('.display').style.background = themes[currentTheme].display;
        }

        // Event listeners for buttons
        document.querySelectorAll('[data-number]').forEach(button => {
            button.addEventListener('click', () => {
                appendNumber(button.getAttribute('data-number'));
                updateDisplay();
            });
        });

        document.querySelectorAll('[data-action]').forEach(button => {
            button.addEventListener('click', () => {
                const action = button.getAttribute('data-action');
                
                if (action === 'clear') {
                    clear();
                } else if (action === 'delete') {
                    deleteDigit();
                } else if (action === 'equals') {
                    calculate();
                } else if (['add', 'subtract', 'multiply', 'divide', 'power'].includes(action)) {
                    chooseOperation(action);
                } else if (['square', 'square-root', 'reciprocal', 'percent', 'negate'].includes(action)) {
                    executeSpecialFunction(action);
                } else if (['mc', 'mr', 'm-plus', 'm-minus'].includes(action)) {
                    executeMemoryFunction(action);
                } else if (action === 'decimal') {
                    appendNumber('.');
                }
                
                updateDisplay();
            });
        });

        // Keyboard support
        document.addEventListener('keydown', event => {
            if (/[0-9]/.test(event.key)) {
                appendNumber(event.key);
            } else if (event.key === '.') {
                appendNumber('.');
            } else if (event.key === '+' || event.key === '-') {
                chooseOperation(event.key === '+' ? 'add' : 'subtract');
            } else if (event.key === '*') {
                chooseOperation('multiply');
            } else if (event.key === '/') {
                chooseOperation('divide');
            } else if (event.key === 'Enter' || event.key === '=') {
                event.preventDefault();
                calculate();
            } else if (event.key === 'Backspace') {
                deleteDigit();
            } else if (event.key === 'Escape') {
                clear();
            } else if (event.key === '%') {
                executeSpecialFunction('percent');
            }
            updateDisplay();
        });

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
